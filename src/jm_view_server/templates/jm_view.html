<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>看本 · {{ data.title }}</title>
  <!-- PWA -->
  <link rel="manifest" href="/static/manifest.webmanifest">
  <meta name="theme-color" content="#0b0c11">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="看本">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <script>
    (function(){var s=localStorage.getItem('jmv-theme'),p=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.setAttribute('data-theme', s||(p?'dark':'light'));})();
    if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js',{scope:'/'}).catch(function(){});});}
  </script>
  <link rel="stylesheet" href="/static/css/app.css?t={{ randomArg }}">
  <link rel="stylesheet" href="/static/css/reader.css?t={{ randomArg }}">
</head>
<body>

<!-- common.js 第32行无条件读取 #Comic_Top_Nav 的 offsetHeight，此占位不可删 -->
<div id="Comic_Top_Nav" style="display:none"></div>

<!-- 顶部悬浮栏 -->
<div class="reader-top">
  <a href="/?path={{ data.openFromDir }}" class="r-btn" title="原路返回" id="backBtn"></a>
  <div class="reader-title"><b title="{{ data.full_path }}">{{ data.full_path }}</b></div>
  <span class="r-progress" id="topProg">-- / --</span>
</div>

<!-- 图片流 -->
<div class="stream" id="stream">
  {% for image in data.images %}
  <div class="center scramble-page" id="page_{{ loop.index0 }}" data-page="{{ loop.index0 }}">
    <img class="lazyload page-img"
         src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
         data-src="{{ image.data_original }}"
         data-original="{{ image.data_original }}"
         alt="第 {{ loop.index }} 页">
  </div>
  {% endfor %}
</div>

<!-- 右侧阅读工具抽屉：桌面端悬停展开，移动端点击把手展开。 -->
<div class="r-tools" aria-label="阅读工具栏">
  <button class="reader-tools-handle" id="toolsHandle" type="button" aria-label="展开阅读工具栏" aria-expanded="false" aria-pressed="false"><i></i><i></i><i></i></button>
  <!-- 跳页浮窗 -->
  <div class="jump-pop" id="jumpPop">
    <select id="jumpSelect">
      {% for image in data.images %}
      <option value="{{ loop.index0 }}">第 {{ loop.index }} / {{ loop.length }} 页</option>
      {% endfor %}
    </select>
  </div>
  <!-- 更多功能浮窗 -->
  <div class="more-pop" id="morePop">
    <div class="more-pop-head"><b>阅读设置</b><span>Reader controls</span></div>
    <div class="reader-mode-control" aria-label="阅读模式">
      <button id="modeScroll" type="button">下拉</button>
      <button id="modeSingle" type="button">单页</button>
      <button id="modeDouble" type="button">双页</button>
    </div>
    <button id="tHead" title="顶部栏开关" data-tip="顶部栏"></button>
    <button id="tProg" title="进度条开关" data-tip="进度条"></button>
    <button id="tEye" title="护眼滤镜" data-tip="护眼模式"></button>
    
    <!-- 图片大小按钮，将其包裹，使 sizePop 相对其水平定位 -->
    <div class="reader-size-control" style="position:relative; width:42px; height:42px;">
      <button id="tSize" title="图片大小" data-tip="图片大小" style="position:absolute; inset:0; margin:0;"></button>
      
      <!-- 图片大小调节浮窗 -->
      <div class="jump-pop reader-size-pop" id="sizePop" style="position:absolute; right:calc(100% + 12px); top:50%; transform:translateY(-50%) scale(0.96); transform-origin:right center;">
        <span id="tSizeVal" class="reader-size-value">800px</span>
        <div id="sizeRangeControl" class="reader-size-range-control">
          <input type="range" id="tSizeRange" min="300" max="1600" step="50" value="800" title="拖动调节图片大小">
        </div>
        <label id="doubleWidthScaleControl" class="reader-double-scale-control" for="doubleWidthScaleRange" hidden>
          <span>画面比例</span>
          <input type="range" id="doubleWidthScaleRange" min="50" max="100" step="1" value="98">
          <output id="doubleWidthScaleValue">98%</output>
        </label>
        <button id="tSizeReset" title="恢复默认" style="border:none; background:none; color:var(--text-secondary); cursor:pointer; display:grid; place-items:center; width:22px; height:22px; border-radius:4px; padding:0; transition:all 0.14s;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:13px; height:13px;"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M16 3h5v5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 21H3v-5"/></svg>
        </button>
      </div>
    </div>
    
    <button id="tAutoNext" title="自动连播下本" data-tip="自动连播"></button>
    <button id="tFull" title="全屏阅读" data-tip="全屏阅读"></button>
    <button id="tHelp" title="快捷键帮助" data-tip="快捷键帮助" aria-label="快捷键帮助">?</button>
  </div>
  <div class="reader-tools-main">
    <a id="gotop" href="javascript:void(0)" title="回到顶部" data-tip="回到顶部"></a>
    <a id="gobottom" href="javascript:void(0)" title="跳到最后" data-tip="跳到最后"></a>
    <a id="tJump" href="javascript:void(0)" title="跳转页码" data-tip="跳转页码"></a>
    <button id="tGrid" type="button" title="缩略图总览" data-tip="缩略图总览" aria-label="打开缩略图总览" aria-haspopup="dialog" aria-controls="readerGridOverlay">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3.5" y="3.5" width="6.5" height="7" rx="1"/><rect x="14" y="3.5" width="6.5" height="7" rx="1"/>
        <rect x="3.5" y="13.5" width="6.5" height="7" rx="1"/><rect x="14" y="13.5" width="6.5" height="7" rx="1"/>
      </svg>
    </button>
    <span class="reader-tool-divider" aria-hidden="true"></span>
    <a id="loadAll" href="javascript:void(0)" title="加载全部" data-tip="加载全部"></a>
    <a href="/?path={{ data.openFromDir }}" title="原路返回" data-tip="原路返回"></a>
    <a href="https://18comic.vip/search/photos?main_tag=0&search_query={{ data.title }}" title="搜原本" data-tip="搜原本" target="_blank" rel="noopener"></a>
    <button id="tMore" title="更多功能" data-tip="阅读设置"></button>
  </div>
</div>

<output class="reader-scroll-progress" id="readerScrollProgress" aria-hidden="true">0%</output>

<div class="reader-grid-overlay" id="readerGridOverlay" role="dialog" aria-modal="true" aria-labelledby="readerGridTitle" aria-describedby="readerGridDescription" aria-hidden="true">
  <section class="reader-grid-sheet" aria-label="漫画缩略图总览">
    <header class="reader-grid-head">
      <div class="reader-grid-heading">
        <span class="reader-grid-kicker">Contact sheet</span>
        <h2 id="readerGridTitle">缩略图总览</h2>
        <p id="readerGridDescription">浏览整本页面，选择缩略图即可跳转。</p>
      </div>
      <button class="reader-grid-close" id="readerGridClose" type="button" aria-label="关闭缩略图总览">×</button>
    </header>
    <div class="reader-grid" id="readerGrid" role="group" aria-label="漫画页面缩略图"></div>
  </section>
</div>

<div class="reader-help-overlay" id="readerHelp" role="dialog" aria-modal="true" aria-labelledby="readerHelpTitle">
  <div class="reader-help-card">
    <div class="reader-help-head">
      <div><div style="font-size:11px;color:var(--brand);font-family:var(--font-mono);letter-spacing:.1em;text-transform:uppercase">Reader field guide</div><h2 id="readerHelpTitle">阅读快捷键</h2></div>
      <button class="reader-help-close" id="readerHelpClose" aria-label="关闭快捷键帮助">×</button>
    </div>
    <div class="reader-shortcut-list" id="readerShortcutList"></div>
  </div>
</div>

<div class="rotate-radial" id="rotateRadial" role="menu" aria-label="图片旋转方向" aria-hidden="true" inert>
  <button class="rotate-sector rotate-sector-top" type="button" role="menuitemradio" data-rotate="0" aria-label="恢复原始方向" aria-checked="false" tabindex="-1"><span>0°</span></button>
  <button class="rotate-sector rotate-sector-right" type="button" role="menuitemradio" data-rotate="90" aria-label="向右旋转 90 度" aria-checked="false" tabindex="-1"><span>90°</span></button>
  <button class="rotate-sector rotate-sector-bottom" type="button" role="menuitemradio" data-rotate="180" aria-label="旋转 180 度" aria-checked="false" tabindex="-1"><span>180°</span></button>
  <button class="rotate-sector rotate-sector-left" type="button" role="menuitemradio" data-rotate="270" aria-label="向左旋转 90 度" aria-checked="false" tabindex="-1"><span>270°</span></button>
  <span class="rotate-radial-center" aria-hidden="true">旋转</span>
</div>

<!-- 底部进度区 -->
<div class="r-bottom" id="rBottom">
  <span class="r-count" id="curPage">第 1 页</span>
  <div class="r-track" id="track"><div class="r-fill" id="fill"></div></div>
  <select class="r-jump" id="pageselect">
    {% for image in data.images %}
    <option value="{{ loop.index0 }}">{{ loop.index }}/{{ loop.length }}</option>
    {% endfor %}
  </select>
</div>

<script src="/static/js/app.js?t={{ randomArg }}"></script>
<script src="/static/js/common.js?t={{ randomArg }}"></script>
<script id="readerConfig" type="application/json">{{ {
  'albumId': data.title,
  'nextDirPath': data.next_dir_path,
  'openFromDir': data.openFromDir
} | tojson }}</script>
<script src="/static/js/reader.js?t={{ randomArg }}"></script>
</body>
</html>
