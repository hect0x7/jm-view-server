<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文件浏览器 V2 | 离线看本</title>
    <!-- Use existing FontAwesome -->
    <link rel="stylesheet" href="../static/css/all.min.css">
    <!-- New SPA styles -->
    <link rel="stylesheet" href="../static/css/index_spa.css?t={{ randomArg }}">
    <!-- Dependencies -->
    <script src="../static/js/jquery-3.7.1.min.js"></script>
    <script src="../static/js/common.js?t={{ randomArg }}"></script>
</head>

<body>
    <div class="spa-container">
        <!-- Header / Toolbar -->
        <header class="spa-header">
            <div class="left-controls">
                <div class="brand">
                    <i class="fas fa-columns"></i> <span>JM Server V2</span>
                </div>
                <!-- 局域网 IP 显示 -->
                <div class="lan-ip-display" title="点击复制服务器地址" 
                     onclick="copyServerAddress('http://{{ data.lan_ip }}:{{ data.port }}')"
                     style="display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.05); padding: 4px 12px; border-radius: 20px; font-size: 13px; color: #475569; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); transition: all 0.2s;">
                    <i class="fas fa-network-wired" style="color: #6366f1;"></i>
                    <span style="font-family: monospace; font-weight: 500;">{{ data.lan_ip }}:{{ data.port }}</span>
                </div>
                <button class="nav-btn-icon" id="btn-home" title="回到首页">
                    <i class="fas fa-home"></i>
                </button>
                <div class="drivers-list">
                    {% for driver in data.drivers %}
                    <button class="driver-btn" onclick="navigateTo('{{ driver|replace('\\', '\\\\') }}')">{{ driver
                        }}</button>
                    {% endfor %}
                </div>
            </div>

            <div class="middle-controls">
                <div class="path-input-wrapper">
                    <input type="text" class="path-breadcumb" id="currentPathDisplay" value="{{ data.currentPath }}"
                        autocomplete="off">
                    <ul class="autocomplete-dropdown" id="pathSuggestions" style="display:none;"></ul>
                </div>
                <button class="action-icon" id="btn-add-bookmark" title="收藏当前目录">
                    <i class="far fa-star"></i>
                </button>
            </div>

            <div class="right-controls">
                <!-- 消息按钮入口 -->
                <a href="/message" target="_blank" class="btn btn-outline" style="border-color: #818cf8; color: #6366f1;" title="打开聊天室">
                    <i class="fas fa-comment-dots"></i> 消息
                </a>
                <button class="btn btn-ghost" id="btn-show-bookmarks" title="查看收藏夹">
                    <i class="fas fa-bookmark"></i> 收藏夹
                </button>
                <button class="btn btn-primary" id="btn-view-album" title="以本子模式浏览当前目录">
                    <i class="fas fa-images"></i> 看图
                </button>
                <a href="javascript:void(0)" id="btn-back-legacy" class="btn btn-outline" title="返回旧版">
                    <i class="fas fa-undo"></i>
                </a>
                <button class="btn btn-primary" id="btn-refresh" title="刷新">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </header>

        <!-- Bookmarks Drawer -->
        <div class="bookmarks-overlay" id="bookmarksOverlay" style="display:none;"></div>
        <div class="bookmarks-drawer" id="bookmarksDrawer">
            <div class="drawer-header">
                <span>我的收藏</span>
                <button class="close-drawer" id="btnCloseBookmarks"><i class="fas fa-times"></i></button>
            </div>
            <ul class="bookmarks-list" id="bookmarksList">
                <!-- Injected by JS -->
            </ul>
        </div>

        <!-- Main Split View -->
        <main class="spa-split-view">
            <!-- Sidebar: File Navigation -->
            <aside class="spa-sidebar" id="fileSidebar">
                <div class="sidebar-header">
                    <button class="nav-btn" id="btn-parent-dir" title="上级目录">
                        <i class="fas fa-level-up-alt"></i> ..
                    </button>
                    <span class="sidebar-title">文件导航</span>
                </div>
                <div class="file-list-container">
                    <ul class="file-list" id="fileList">
                        <!-- Items injected by JS -->
                        <li class="loading-state">加载中...</li>
                    </ul>
                </div>
            </aside>

            <!-- Resizer -->
            <div class="resizer" id="dragMe"></div>

            <!-- Main: Content Viewer -->
            <section class="spa-viewer" id="mainViewer">
                <div class="viewer-placeholder">
                    <div class="placeholder-content">
                        <i class="fas fa-book-open"></i>
                        <p>请在左侧选择一个相册(本子)进行阅读</p>
                    </div>
                </div>
                <!-- Images will be injected here -->
                <div id="imageContainer" class="image-stream-container" style="display: none;">
                </div>
            </section>
        </main>
    </div>

    <!-- Init Data -->
    <script>
        const INITIAL_PATH = "{{ data.currentPath|replace('\\', '\\\\')|safe }}";
        const DEFAULT_PATH = "{{ data.defaultPath|replace('\\', '\\\\')|safe }}";

        function copyServerAddress(text) {
            const tempInput = document.createElement("input");
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            
            // 使用自定义的 Notification
            if (window.createSiteNotification) {
                window.createSiteNotification({sender: '系统', content: '服务器地址已复制到剪贴板！'});
            }
        }
    </script>
    <script src="../static/js/index_spa.js?t={{ randomArg }}"></script>
</body>

</html>
